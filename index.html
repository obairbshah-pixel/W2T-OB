<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Direct</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --wa-green: #25D366;
            --wa-dark: #128C7E;
            --bg-color: #ECE5DD;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }
        .header-credit {
            font-size: 14px;
            color: #128C7E;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .icon {
            width: 60px;
            height: 60px;
            background-color: var(--wa-green);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .icon svg {
            width: 35px;
            height: 35px;
            fill: white;
        }
        h2 {
            margin: 0 0 10px 0;
            color: #333;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input, select {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            border-color: var(--wa-green);
        }
        .country-code {
            width: 80px;
            background: #f8f9fa;
        }
        .phone-input {
            flex-grow: 1;
        }
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--wa-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: var(--wa-dark);
        }
        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-credit">CREATED BY OBAIR SHAH</div>
        
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
        </div>
        <h2>Direct Message</h2>
        <p>Send a WhatsApp message without saving the contact.</p>

        <div class="input-group">
            <input type="text" id="countryCode" class="country-code" value="+91" placeholder="+91">
            <input type="tel" id="phoneNumber" class="phone-input" placeholder="Enter phone number" autocomplete="off">
        </div>
        <div id="errorMsg" class="error">Please enter a valid number.</div>

        <button onclick="openWhatsApp()">Open WhatsApp</button>
    </div>

    <script>
        function openWhatsApp() {
            let country = document.getElementById('countryCode').value.replace(/\D/g, ''); 
            let phone = document.getElementById('phoneNumber').value.replace(/\D/g, ''); 
            let errorMsg = document.getElementById('errorMsg');

            if (phone.length < 5) {
                errorMsg.style.display = 'block';
                return;
            }
            
            errorMsg.style.display = 'none';
            let fullNumber = country + phone;
            let isAndroid = /Android/i.test(navigator.userAgent);
            
            if (isAndroid) {
                window.location.href = `intent://send?phone=${fullNumber}#Intent;package=com.whatsapp;scheme=whatsapp;end;`;
                setTimeout(function() {
                    window.location.href = `https://wa.me/${fullNumber}`;
                }, 500);
            } else {
                window.location.href = `https://wa.me/${fullNumber}`;
            }
        }

        document.getElementById('phoneNumber').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                openWhatsApp();
            }
        });
    </script>
</body>
</html>
